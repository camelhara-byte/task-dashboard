<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>業務ダッシュボード｜キャメルグループ事務局</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fb;--sf:#fff;--sf2:#f8f9fd;--bd:#e4e9f2;
  --tx:#14213d;--mid:#4a5568;--mt:#8a96b0;
  --ac:#3b5bdb;--ac-bg:#eff2ff;--ac-bd:#bac8ff;
  --dn:#2f9e44;--dn-bg:#ebfbee;--dn-bd:#b2f2bb;
  --pg:#e67700;--pg-bg:#fff9db;--pg-bd:#ffec99;
  --wt:#5c6680;--wt-bg:#f1f3f5;--wt-bd:#ced4da;
  --td:#c92a2a;--td-bg:#fff5f5;--td-bd:#ffc9c9;
  --mkt:#c2255c;--mkt-bg:#fce7f3;
  --edu:#099268;--edu-bg:#d3f9d8;
  --sub:#e67700;--sub-bg:#fff3bf;
  --ops:#d9480f;--ops-bg:#ffedd5;
  --hr:#7048e8;--hr-bg:#ede9fe;
  --dx:#1971c2;--dx-bg:#dbeafe;
  --etc:#5c6680;--etc-bg:#f1f3f5;
  --r:10px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  --shm:0 4px 20px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:"Noto Sans JP",sans-serif;font-size:14px;line-height:1.6}
.mono{font-family:"JetBrains Mono",monospace}
a{color:inherit;text-decoration:none}

.hd{background:var(--sf);border-bottom:1px solid var(--bd);box-shadow:0 1px 6px rgba(0,0,0,.05);position:sticky;top:0;z-index:200}
.hd-in{max-width:1320px;margin:0 auto;padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between}
.hd-l{display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--ac),#7950f2);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:15px;box-shadow:0 2px 8px rgba(59,91,219,.3);flex-shrink:0}
.hd-title{font-size:15px;font-weight:700}
.hd-sub{font-size:11px;color:var(--mt)}
.chips{display:flex;gap:8px}
.chip{background:var(--sf2);border:1px solid var(--bd);border-radius:20px;padding:3px 11px;font-size:11px;color:var(--mid);display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%}
.dd{background:var(--dn)}.dp{background:var(--pg)}.dt{background:var(--td)}

.tb{background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:58px;z-index:100}
.tb-in{max-width:1320px;margin:0 auto;padding:0 28px;display:flex}
.tab{padding:13px 24px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--mt);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:700}

.wrap{max-width:1320px;margin:0 auto;padding:28px 28px 80px}
.sec{display:none;animation:fi .2s}
.sec.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.stitle{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--bd)}

.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.t-mkt{background:var(--mkt-bg);color:var(--mkt)}.t-edu{background:var(--edu-bg);color:var(--edu)}
.t-sub{background:var(--sub-bg);color:var(--sub)}.t-ops{background:var(--ops-bg);color:var(--ops)}
.t-hr{background:var(--hr-bg);color:var(--hr)}.t-dx{background:var(--dx-bg);color:var(--dx)}.t-etc{background:var(--etc-bg);color:var(--etc)}
.sz-大{background:#fee2e2;color:var(--td);border:1px solid var(--td-bd)}
.sz-中{background:var(--pg-bg);color:var(--pg);border:1px solid var(--pg-bd)}
.sz-小{background:var(--sf2);color:var(--mt);border:1px solid var(--bd)}
.sp{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600}
.sp::before{content:"";width:5px;height:5px;border-radius:50%}
.sp-完了{background:var(--dn-bg);color:var(--dn)}.sp-完了::before{background:var(--dn)}
.sp-進行中{background:var(--pg-bg);color:var(--pg)}.sp-進行中::before{background:var(--pg)}
.sp-未着手{background:var(--td-bg);color:var(--td)}.sp-未着手::before{background:var(--td)}
.sp-待ち{background:var(--wt-bg);color:var(--wt)}.sp-待ち::before{background:var(--wt)}

/* Active */
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.acard{background:var(--sf);border:1px solid var(--bd);border-left:3px solid var(--pg);border-radius:var(--rs);padding:14px;box-shadow:var(--sh);cursor:pointer;transition:all .15s}
.acard:hover{box-shadow:var(--shm);transform:translateY(-1px)}
.atags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.aname{font-size:13px;font-weight:700;margin-bottom:8px;line-height:1.4}
.pb-wrap{margin-bottom:7px}
.pb-row{display:flex;justify-content:space-between;font-size:11px;color:var(--mt);font-family:"JetBrains Mono",monospace;margin-bottom:3px}
.pbar{height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:var(--pg);border-radius:3px}
.anext{font-size:11px;color:var(--ac);font-weight:600;display:flex;gap:5px;margin-top:7px;border-top:1px solid var(--sf2);padding-top:7px}
.anext::before{content:"→";flex-shrink:0}
.adate{font-size:10px;color:var(--mt);margin-top:5px;font-family:"JetBrains Mono",monospace}

.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:28px}
.wcard{background:var(--sf);border:1px solid var(--wt-bd);border-left:3px solid var(--wt);border-radius:var(--rs);padding:12px 14px;cursor:pointer;transition:all .15s}
.tcard{background:var(--sf);border:1px solid var(--bd);border-left:3px solid var(--td);border-radius:var(--rs);padding:12px 14px;cursor:pointer;transition:all .15s}
.wcard:hover,.tcard:hover{box-shadow:var(--shm)}
.cname{font-size:13px;font-weight:600;margin-bottom:6px}
.ctags{display:flex;gap:5px;flex-wrap:wrap}

/* Overview */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px}
.kpi-p::after{background:var(--pg)}.kpi-t::after{background:var(--td)}.kpi-d::after{background:var(--dn)}
.klbl{font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.knum{font-family:"JetBrains Mono",monospace;font-size:40px;font-weight:700;line-height:1;margin-bottom:6px}
.kpi-p .knum{color:var(--pg)}.kpi-t .knum{color:var(--td)}.kpi-d .knum{color:var(--dn)}
.ksub{font-size:11px;color:var(--mt);display:flex;gap:10px;flex-wrap:wrap}
.ksub strong{color:var(--mid);font-weight:600}

.cs{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:26px}
.cc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 8px;text-align:center;border-top:3px solid var(--bd);box-shadow:var(--sh);cursor:pointer;transition:all .15s}
.cc:hover{box-shadow:var(--shm);transform:translateY(-2px)}
.c-mkt{border-top-color:var(--mkt)}.c-edu{border-top-color:var(--edu)}.c-sub{border-top-color:var(--sub)}
.c-ops{border-top-color:var(--ops)}.c-hr{border-top-color:var(--hr)}.c-dx{border-top-color:var(--dx)}.c-etc{border-top-color:var(--etc)}
.cc-lbl{font-size:9px;color:var(--mt);margin-bottom:5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-n{font-family:"JetBrains Mono",monospace;font-size:20px;font-weight:700;margin-bottom:4px}
.cbw{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;display:flex}
.cbd{background:var(--dn)}.cbp{background:var(--pg)}.cbt{background:var(--td)}
.cc-rate{font-size:10px;color:var(--mt);margin-top:4px}

/* Table */
.tbl{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--sf2);border-bottom:1px solid var(--bd)}
th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.1em}
td{padding:10px 14px;vertical-align:middle}
tbody tr{cursor:pointer;border-bottom:1px solid rgba(0,0,0,.04)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{filter:brightness(.97)}
tr.r-prog{background:#fffbf0}
tr.r-wait{background:#f9fafb}
tr.r-todo{background:#fff8f8}
tr.r-done{background:#f6fef8}

/* Month log */
.ml{display:flex;flex-direction:column;gap:36px}
.m-hd{display:flex;align-items:baseline;gap:14px;margin-bottom:10px}
.m-title{font-size:20px;font-weight:900}
.m-cnt{font-size:12px;color:var(--mt)}
.m-div{height:3px;background:linear-gradient(90deg,var(--ac),transparent);border-radius:2px;margin-bottom:18px}
.m-kpis{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.mkpi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 16px;min-width:76px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.mkpi .mn{font-family:"JetBrains Mono",monospace;font-size:22px;font-weight:700;color:var(--dn);display:block}
.mkpi .ml2{font-size:10px;color:var(--mt);text-transform:uppercase;letter-spacing:.06em}
.msub{font-size:12px;font-weight:700;color:var(--mid);margin-bottom:10px}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:14px}
.dcard{background:var(--sf);border:1px solid var(--dn-bd);border-left:3px solid var(--dn);border-radius:var(--rs);padding:12px 14px;cursor:pointer;transition:all .15s}
.dcard:hover{box-shadow:var(--shm);transform:translateY(-1px)}
.dname{font-size:13px;font-weight:700;margin-bottom:6px}
.dtags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.dlink{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ac);font-weight:600;background:var(--ac-bg);border:1px solid var(--ac-bd);border-radius:4px;padding:2px 8px;margin-top:4px;text-decoration:none;transition:all .15s}
.dlink:hover{background:var(--ac);color:#fff}
.spills{display:flex;flex-wrap:wrap;gap:6px}
.spill{background:var(--sf2);border:1px solid var(--bd);border-radius:16px;padding:3px 10px;font-size:11px;color:var(--mid);cursor:pointer;transition:all .15s}
.spill:hover{border-color:var(--dn-bd);background:var(--dn-bg)}
.ppills{display:flex;flex-wrap:wrap;gap:6px}
.ppill{background:var(--pg-bg);border:1px solid var(--pg-bd);border-radius:16px;padding:3px 10px;font-size:11px;color:var(--pg);cursor:pointer}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:1000;backdrop-filter:blur(3px)}
.mbg.on{display:flex;align-items:center;justify-content:center}
.modal{background:var(--sf);border-radius:14px;padding:26px;max-width:540px;width:calc(100% - 36px);max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.16);animation:fi .2s}
.mc{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--mt);line-height:1}
.mc:hover{color:var(--tx)}
.modal h2{font-size:16px;font-weight:700;margin-bottom:12px;padding-right:26px;line-height:1.4}
.mtags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.mrow{display:flex;padding:8px 0;border-bottom:1px solid var(--sf2)}
.mrow:last-child{border:none}
.mkey{width:80px;font-size:10px;color:var(--mt);font-weight:700;text-transform:uppercase;letter-spacing:.07em;flex-shrink:0;padding-top:2px}
.mval{flex:1;font-size:13px}
.sl{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.si{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;border-radius:6px;font-size:13px;line-height:1.5}
.si.sd{background:var(--dn-bg);border:1px solid var(--dn-bd);color:var(--dn)}
.si.su{background:var(--sf2);border:1px solid var(--bd);color:var(--mid)}
.si.sw{background:var(--wt-bg);border:1px solid var(--wt-bd);color:var(--wt)}
.si-ic{flex-shrink:0;width:14px}

@media(max-width:1000px){.kpis{grid-template-columns:1fr 1fr 1fr}.ag{grid-template-columns:1fr 1fr}.cs{grid-template-columns:repeat(4,1fr)}}
@media(max-width:640px){
  .wrap,.hd-in,.tb-in{padding-left:16px;padding-right:16px}
  .kpis{grid-template-columns:1fr 1fr;gap:10px}.knum{font-size:28px}
  .ag{grid-template-columns:1fr}.cs{grid-template-columns:repeat(2,1fr)}.chips{display:none}
}

/* Link management */
.link-add-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ac);background:var(--ac-bg);border:1px dashed var(--ac-bd);border-radius:4px;padding:3px 9px;cursor:pointer;transition:all .15s;font-family:inherit;margin-top:4px}
.link-add-btn:hover{background:var(--ac);color:#fff;border-style:solid}
.link-form{background:var(--sf2);border:1px solid var(--ac-bd);border-radius:8px;padding:14px;margin-top:10px}
.link-form-title{font-size:12px;font-weight:700;color:var(--ac);margin-bottom:10px}
.link-form input{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:12px;color:var(--tx);margin-bottom:8px;display:block}
.link-form input:focus{outline:none;border-color:var(--ac)}
.link-form input::placeholder{color:var(--mt)}
.link-form-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-save{background:var(--ac);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-family:inherit;font-size:12px;cursor:pointer;font-weight:600}
.btn-save:hover{opacity:.85}
.btn-cancel{background:var(--sf2);color:var(--mid);border:1px solid var(--bd);border-radius:6px;padding:6px 14px;font-family:inherit;font-size:12px;cursor:pointer}
.user-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ac);font-weight:600;background:var(--ac-bg);border:1px solid var(--ac-bd);border-radius:4px;padding:2px 8px;text-decoration:none;transition:all .15s}
.user-link:hover{background:var(--ac);color:#fff}
.link-del{background:none;border:none;color:var(--mt);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;transition:all .15s}
.link-del:hover{color:var(--td)}
.user-links-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;align-items:center}

/* Sync button */
.sync-btn{background:var(--ac-bg);border:1px solid var(--ac-bd);border-radius:6px;padding:4px 12px;font-size:11px;color:var(--ac);cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.sync-btn:hover{background:var(--ac);color:#fff;border-color:var(--ac)}

/* Today highlights */
.today-badge{display:inline-flex;align-items:center;gap:3px;background:#fce7f3;color:#c2255c;border:1px solid #f9a8d4;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}
.acard.is-today{border-left-color:#c2255c;box-shadow:0 0 0 2px rgba(194,37,92,.10),var(--sh)}
.today-hd{background:linear-gradient(90deg,#fff0f6,var(--bg));border:1px solid #f9a8d4;border-left:3px solid #c2255c;border-radius:var(--rs);padding:12px 16px;margin-bottom:20px}
.today-hd-title{font-size:12px;font-weight:700;color:#c2255c;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.today-pills{display:flex;flex-wrap:wrap;gap:6px}
.today-pill{background:#fff;border:1px solid #f9a8d4;border-radius:12px;padding:3px 10px;font-size:12px;color:#c2255c;cursor:pointer;transition:all .15s;font-weight:500}
.today-pill:hover{background:#fce7f3}

/* Subtask section divider in modal */
.s-divider{font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin:10px 0 6px;display:flex;align-items:center;gap:6px}
.s-divider::after{content:"";flex:1;height:1px;background:var(--bd)}
.si.sd{opacity:.75}

</style>
</head>
<body>

<header class="hd">
  <div class="hd-in">
    <div class="hd-l">
      <div class="logo">C</div>
      <div>
        <div class="hd-title">業務ダッシュボード</div>
        <div class="hd-sub">キャメルグループ事務局 · 2026年3〜5月 · 担当：原</div>
      </div>
    </div>
    <div class="chips">
      <div class="chip"><span class="dot dd"></span>完了 <strong id="hd-d">—</strong></div>
      <div class="chip"><span class="dot dp"></span>進行中 <strong id="hd-p">—</strong></div>
      <div class="chip"><span class="dot dt"></span>予定 <strong id="hd-t">—</strong></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
      <span id="hd-upd" style="font-size:11px;color:var(--mt);white-space:nowrap"></span>
      <button class="sync-btn" onclick="doSync()" title="GitHub Actionsでワークフローを実行してNotionデータを更新">🔄 同期</button>
    </div>
  </div>
</header>

<div class="tb">
  <div class="tb-in">
    <button class="tab on" data-t="log">📅 月別ログ</button>
    <button class="tab" data-t="active">⚡ アクティブ</button>
    <button class="tab" data-t="overview">📊 概要</button>
  </div>
</div>

<div class="wrap">

<section class="sec on" id="sec-log">
  <div class="ml" id="ml"></div>
</section>

<section class="sec" id="sec-active">
  <div id="today-section"></div>
  <div class="stitle">⚡ 進行中（最終更新 新しい順）</div>
  <div class="ag" id="ag"></div>
  <div class="stitle">⏳ 対応待ち・依頼中</div>
  <div class="sg" id="wg"></div>
  <div class="stitle">📋 今後着手予定</div>
  <div class="sg" id="tg"></div>
</section>

<section class="sec" id="sec-overview">
  <div class="kpis">
    <div class="kpi kpi-p">
      <div class="klbl">🔄 進行中</div>
      <div class="knum" id="kP">—</div>
      <div class="ksub">大 <strong id="kPb">—</strong> ／ 中 <strong id="kPm">—</strong> ／ 小 <strong id="kPs">—</strong></div>
    </div>
    <div class="kpi kpi-t">
      <div class="klbl">📋 未着手・待ち</div>
      <div class="knum" id="kT">—</div>
      <div class="ksub">未着手 <strong id="kTn">—</strong> ／ 待ち <strong id="kWn">—</strong></div>
    </div>
    <div class="kpi kpi-d">
      <div class="klbl">✅ 完了</div>
      <div class="knum" id="kD">—</div>
      <div class="ksub">達成率 <strong id="kR">—</strong></div>
    </div>
  </div>
  <div class="stitle">業務領域別 進捗</div>
  <div class="cs" id="cs"></div>
  <div class="stitle">全タスク一覧</div>
  <div class="tbl"><table>
    <thead><tr><th>領域</th><th>規模</th><th>タスク名</th><th>ステータス</th><th>進捗</th><th>更新日</th></tr></thead>
    <tbody id="tbl"></tbody>
  </table></div>
</section>

</div>

<div class="mbg" id="mbg">
  <div class="modal" id="modal"></div>

function esc(s){return String(s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function cn(arr,s){return arr.filter(function(t){return t.status===s;}).length;}
function calcPct(t){
  if(!t.subtasks||!t.subtasks.length) return -1;
  var d=t.subtasks.filter(function(s){return s.indexOf("✓")>=0;}).length;
  return Math.round(d/t.subtasks.length*100);
}
function calcDone(t){return t.subtasks?t.subtasks.filter(function(s){return s.indexOf("✓")>=0;}).length:0;}
function calcNext(t){
  if(!t.subtasks) return "";
  for(var i=0;i<t.subtasks.length;i++){
    var s=t.subtasks[i];
    if(s.indexOf("→")>=0&&s.indexOf("✓")<0){
      return s.replace(/→未|→待ち|→継続|→/g,"").trim();
    }
  }
  return "";
}

function showM(name){
  var t=null;
  for(var i=0;i<T.length;i++){if(T[i].name===name){t=T[i];break;}}
  if(!t)return;
  var p=calcPct(t),dn=calcDone(t);
  var subHTML="";
  if(t.subtasks&&t.subtasks.length){
    var pending=t.subtasks.filter(function(s){return s.indexOf("✓")<0;});
    var done=t.subtasks.filter(function(s){return s.indexOf("✓")>=0;});
    var bar=p>=0?'<div class="mono" style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--mid)">'+dn+"/"+t.subtasks.length+' 完了 <span style="font-weight:400;font-size:11px;color:var(--mt)">('+p+'%)</span></div>':'';
    var prog=p>=0?'<div class="pbar" style="height:6px;margin-bottom:14px"><div class="pfill" style="width:'+p+'%"></div></div>':'';
    var pendHTML="";
    if(pending.length){
      pendHTML='<div class="s-divider">残り '+pending.length+'件</div>'+
        pending.map(function(s){
          var iw=s.indexOf("待ち")>=0||s.indexOf("継続")>=0;
          var cls=iw?"sw":"su";
          var ic=iw?"⏳":"→";
          var lbl=s.replace(/→未|→待ち|→継続|→/g,"").trim();
          return '<div class="si '+cls+'"><span class="si-ic">'+ic+"</span><span>"+esc(lbl)+"</span></div>";
        }).join("");
    }
    var doneHTML="";
    if(done.length){
      doneHTML='<div class="s-divider" style="margin-top:14px">完了 '+done.length+'件</div>'+
        done.map(function(s){
          var lbl=s.replace(/✓/g,"").trim();
          return '<div class="si sd"><span class="si-ic">✓</span><span>'+esc(lbl)+"</span></div>";
        }).join("");
    }
    subHTML='<div class="mrow"><div class="mkey">工程</div><div class="mval">'+bar+prog+'<div class="sl">'+pendHTML+doneHTML+"</div></div></div>";
  }
  document.getElementById("modal").innerHTML=
    '<button class="mc" onclick="closeM()">×</button>'+
    "<h2>"+esc(t.name)+"</h2>"+
    '<div class="mtags">'+ctag(t.category)+" "+sztag(t.size)+' <span class="sp sp-'+t.status+'">'+t.status+"</span></div>"+
    subHTML+
    '<div class="mrow"><div class="mkey">アウトプット</div><div class="mval">'+
      '<div id="modal-links"></div>'+

    "</div></div>"+
    (t.updateDate?'<div class="mrow"><div class="mkey">更新日</div><div class="mval mono">'+esc(t.updateDate)+"</div></div>":"");
  document.getElementById("mbg").classList.add("on");
  renderModalLinks(name);
}

    '<div class="cname">⏳ '+esc(t.name)+"</div>"+
    '<div class="ctags">'+ctag(t.category)+" "+sztag(t.size)+"</div></div>";
}).join(''):'<p style="color:var(--mt);font-size:12px;padding:8px 0;">なし</p>';

var todoT=T.filter(function(t){return t.status==="未着手";}).sort(function(a,b){
  return CO.indexOf(a.category)-CO.indexOf(b.category);
});
document.getElementById("tg").innerHTML=todoT.map(function(t){
  return '<div class="tcard" data-name="'+esc(t.name)+'" onclick="openCard(this)">'+
    '<div class="cname">'+esc(t.name)+"</div>"+
    '<div class="ctags">'+ctag(t.category)+" "+sztag(t.size)+"</div></div>";
}).join("");

// ── OVERVIEW cat strip ──
document.getElementById("cs").innerHTML=CO.map(function(c){
  var arr=T.filter(function(t){return t.category===c;});
  var d=cn(arr,"完了"),p=cn(arr,"進行中"),to=arr.length-d-p;
  var rate=arr.length?Math.round(d/arr.length*100):0;
  return '<div class="cc c-'+(CK[c]||"etc")+'" data-cat="'+esc(c)+'" onclick="filterCat(this)">'+
    '<div class="cc-lbl">'+esc(CL[c]||c)+"</div>"+
    '<div class="cc-n">'+arr.length+"</div>"+
    '<div class="cbw">'+
      '<div class="cbd" style="width:'+(arr.length?d/arr.length*100:0)+'%"></div>'+
      '<div class="cbp" style="width:'+(arr.length?p/arr.length*100:0)+'%"></div>'+
      '<div class="cbt" style="width:'+(arr.length?to/arr.length*100:0)+'%"></div>'+
    "</div>"+
    '<div class="cc-rate">完了 '+rate+"%</div></div>";
}).join("");

var curCat=null;
function filterCat(el){
  var c=el.getAttribute("data-cat");
  document.querySelectorAll(".cc").forEach(function(x){x.style.outline="none";});
  if(curCat===c){curCat=null;renderTbl(T);}
  else{curCat=c;el.style.outline="2px solid var(--ac)";renderTbl(T.filter(function(t){return t.category===c;}));}
}

function renderTbl(arr){
  var sorted=arr.slice().sort(function(a,b){
    if(ST[a.status]!==ST[b.status]) return ST[a.status]-ST[b.status];
    if(SZ[a.size]!==SZ[b.size]) return SZ[a.size]-SZ[b.size];
    return 0;
  });
  var RC={"進行中":"r-prog","待ち":"r-wait","未着手":"r-todo","完了":"r-done"};
  document.getElementById("tbl").innerHTML=sorted.map(function(t){
    var p=calcPct(t),dn=calcDone(t);
    var ps=p>=0?dn+"/"+t.subtasks.length+" ("+p+"%)":"—";
    return '<tr class="'+(RC[t.status]||"")+'" data-name="'+esc(t.name)+'" onclick="openCard(this)">'+
      "<td>"+ctag(t.category)+"</td>"+
      "<td>"+sztag(t.size)+"</td>"+
      '<td style="font-weight:600;">'+esc(t.name)+"</td>"+
      '<td><span class="sp sp-'+t.status+'">'+t.status+"</span></td>"+
      '<td class="mono" style="font-size:11px;color:var(--mt);">'+ps+"</td>"+
      '<td class="mono" style="font-size:11px;color:var(--mt);">'+esc(t.updateDate||"—")+"</td>"+
      "</tr>";
  }).join("");
}
renderTbl(T);

// ── MONTH LOG ──
var months=[{m:5,emoji:"✨",lbl:"2026年5月"},{m:4,emoji:"🌿",lbl:"2026年4月"},{m:3,emoji:"🌸",lbl:"2026年3月"}];
document.getElementById("ml").innerHTML=months.map(function(mo){
  var mt=T.filter(function(t){return t.month===mo.m;});
  var mDone=mt.filter(function(t){return t.status==="完了";});
  var mProg=mt.filter(function(t){return t.status==="進行中";});
  var bigMed=mDone.filter(function(t){return t.size==="大"||t.size==="中";});
  var small=mDone.filter(function(t){return t.size==="小";});
  // 工程✓数：完了タスクのサブタスクのみカウント
  var steps=mDone.reduce(function(s,t){
    return s+(t.subtasks?t.subtasks.filter(function(x){return x.indexOf("✓")>=0;}).length:0);
  },0);

  var _storedAll=getStoredLinks();
  var dcards=bigMed.map(function(t){
    var firstLink=(t.links&&t.links.length)?t.links[0]:null;
    if(!firstLink){var ul=_storedAll[t.name];if(ul&&ul.length)firstLink=ul[0];}
    var linkH=firstLink?'<a href="'+esc(firstLink.url)+'" target="_blank" class="dlink" onclick="event.stopPropagation()">🔗 アウトプットを確認</a>':"";
    return '<div class="dcard" data-name="'+esc(t.name)+'" onclick="openCard(this)">'+
      '<div class="dname">✅ '+esc(t.name)+"</div>"+
      '<div class="dtags">'+ctag(t.category)+" "+sztag(t.size)+"</div>"+
      linkH+"</div>";
  }).join("");

  var spills=small.map(function(t){
    return '<span class="spill" data-name="'+esc(t.name)+'" onclick="openCard(this)">✓ '+esc(t.name)+"</span>";
  }).join("");

  var ppills=mProg.length?
    '<div style="margin-top:18px;"><div class="msub">🔄 '+mo.lbl+'に着手（進行中）</div>'+
    '<div class="ppills">'+mProg.map(function(t){
      return '<span class="ppill" data-name="'+esc(t.name)+'" onclick="openCard(this)">▶ '+esc(t.name)+"</span>";
    }).join("")+"</div></div>":"";

  return "<div>"+
    '<div class="m-hd"><div class="m-title">'+mo.emoji+" "+mo.lbl+"</div>"+
    '<div class="m-cnt">'+mt.length+"件更新</div></div>"+
    '<div class="m-div"></div>'+
    '<div class="m-kpis">'+
      '<div class="mkpi"><span class="mn">'+mDone.length+'</span><div class="ml2">完了件数</div></div>'+
      (bigMed.length?'<div class="mkpi"><span class="mn">'+bigMed.length+'</span><div class="ml2">大中案件</div></div>':"")+
      (steps?'<div class="mkpi"><span class="mn">'+steps+'</span><div class="ml2">完了工程数</div></div>':"")+
    "</div>"+
    (bigMed.length?'<div class="msub">🏆 完成した案件（大・中）</div><div class="dg">'+dcards+"</div>":"")+
    (small.length?'<div class="msub" style="margin-top:12px;">⚡ 完了した小タスク（'+small.length+"件）</div>"+
      '<div class="spills">'+spills+"</div>":"")+
    ppills+"</div>";
}).join("");

// ── USER LINKS (localStorage) ──
var LS_KEY = "camel_links_v1";

function getStoredLinks(){
  try{
    var raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveStoredLinks(obj){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(obj)); }catch(e){}
}
function addUserLink(taskName, label, url){
  var all = getStoredLinks();
  if(!all[taskName]) all[taskName] = [];
  all[taskName].push({label: label||"アウトプット", url: url, id: Date.now()});
  saveStoredLinks(all);
}
function deleteUserLink(taskName, linkId){
  var all = getStoredLinks();
  if(all[taskName]){
    all[taskName] = all[taskName].filter(function(lk){ return lk.id !== linkId; });
    if(!all[taskName].length) delete all[taskName];
  }
  saveStoredLinks(all);
}
function getUserLinks(taskName){
  var all = getStoredLinks();
  return all[taskName] || [];
}

// モーダル内のリンク部分を再描画
function renderModalLinks(taskName){
  var t = null;
  for(var i=0;i<T.length;i++){if(T[i].name===taskName){t=T[i];break;}}
  if(!t) return;

  // 組み込みリンク
  var builtIn = (t.links||[]).map(function(lk){
    return '<a href="'+esc(lk.url)+'" target="_blank" class="user-link">📊 '+esc(lk.label||"アウトプットを確認")+"</a>";
  }).join("");

  // ユーザー追加リンク
  var userLinks = getUserLinks(taskName);
  var userHTML = userLinks.map(function(lk){
    return '<span style="display:inline-flex;align-items:center;gap:2px;">'+
      '<a href="'+esc(lk.url)+'" target="_blank" class="user-link">📊 '+esc(lk.label)+"</a>"+
      '<button class="link-del" onclick="handleDeleteLink('+JSON.stringify(taskName)+','+lk.id+')" title="削除">×</button>'+
      "</span>";
  }).join("");

  var linksArea = document.getElementById("modal-links");
  if(!linksArea) return;

  linksArea.innerHTML = (builtIn||userHTML)?
    '<div class="user-links-wrap">'+builtIn+userHTML+"</div>" : "";
}

function handleDeleteLink(taskName, linkId){
  deleteUserLink(taskName, linkId);
  renderModalLinks(taskName);
}

function showLinkForm(taskName){
  var formArea = document.getElementById("modal-link-form");
  if(!formArea) return;
  formArea.innerHTML =
    '<div class="link-form">'+
    '<div class="link-form-title">➕ アウトプットリンクを追加</div>'+
    '<input id="lf-label" type="text" placeholder="ラベル（例：就業規則ドキュメント）" maxlength="40">'+
    '<input id="lf-url" type="url" placeholder="URL（https://...）">'+
    '<div class="link-form-btns">'+
    '<button class="btn-cancel" onclick="hideLinkForm()">キャンセル</button>'+
    '<button class="btn-save" data-task="'+esc(taskName)+'" onclick="handleSaveLink(this.dataset.task)">保存</button>'+
    "</div></div>";
  document.getElementById("lf-label").focus();
}
function hideLinkForm(){
  var f = document.getElementById("modal-link-form");
  if(f) f.innerHTML="";
}
function handleSaveLink(taskName){
  var label = (document.getElementById("lf-label")||{}).value||"";
  var url   = (document.getElementById("lf-url")||{}).value||"";
  if(!url || !url.startsWith("http")){ alert("URLを正しく入力してください"); return; }
  if(!label) label = "アウトプット";
  addUserLink(taskName, label, url);
  hideLinkForm();
  renderModalLinks(taskName);
  // カードに即時反映
  var stored = getStoredLinks()[taskName];
  if(stored && stored.length){
    var firstUrl = stored[0].url;
    document.querySelectorAll('.dcard[data-name="'+esc(taskName)+'"]').forEach(function(card){
      if(!card.querySelector('.dlink')){
        var a = document.createElement('a');
        a.href = firstUrl; a.target = '_blank'; a.className = 'dlink';
        a.addEventListener('click', function(e){ e.stopPropagation(); });
        a.textContent = '🔗 アウトプットを確認';
        card.appendChild(a);
      }
    });
  }
}

// ── ヘッダー: 最終同期日時 + 同期ボタン ──
var BUILD_TS="BUILD_TIMESTAMP";
var maxDate=T.reduce(function(max,t){return(t.updateDate||"")>max?t.updateDate:max;},"");
var updEl=document.getElementById("hd-upd");
if(updEl){
  if(BUILD_TS!=="BUILD_TIMESTAMP"){
    updEl.textContent="同期: "+BUILD_TS;
  }else if(maxDate){
    updEl.textContent="データ更新: "+maxDate;
  }
}
function doSync(){
  var btn=document.querySelector('.sync-btn');
  var orig=btn?btn.textContent:'';
  if(btn){btn.textContent='⏳ 同期中...';btn.disabled=true;}
  fetch('https://api.github.com/repos/camelhara-byte/task-dashboard/actions/workflows/deploy.yml/dispatches',{
    method:'POST',
    headers:{
      'Authorization':'Bearer SYNC_TOKEN_PLACEHOLDER',
      'Accept':'application/vnd.github+json',
      'X-GitHub-Api-Version':'2022-11-28'
    },
    body:JSON.stringify({ref:'main'})
  }).then(function(res){
    if(btn){
      if(res.status===204){
        btn.textContent='✅ 同期開始！約1分後に反映されます';
        setTimeout(function(){btn.textContent=orig;btn.disabled=false;},5000);
      }else{
        btn.textContent='❌ エラー ('+res.status+')';
        setTimeout(function(){btn.textContent=orig;btn.disabled=false;},4000);
      }
    }
  }).catch(function(){
    if(btn){btn.textContent='❌ ネットワークエラー';setTimeout(function(){btn.textContent=orig;btn.disabled=false;},4000);}
  });
}

</script>
