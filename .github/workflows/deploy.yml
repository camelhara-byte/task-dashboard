name: Build and Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - '業務ダッシュボードv7.html'
      - 'build.py'
      - 'fetch_notion.py'
      - 'requirements.txt'
  schedule:
    - cron: '0 20 * * *'   # 毎日 20:00 UTC = 日本時間 朝5:00
  workflow_dispatch:

permissions:
  contents: write   # 取得した tasks.json をキャッシュとしてコミットするため
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Notion data
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python fetch_notion.py

      - name: Build index.html
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: python build.py

      # 取得したタスクデータをリポジトリにキャッシュ（在宅報告の高速ビルド用）。
      # 失敗してもデプロイは止めない。
      - name: Cache tasks.json back to repo
        continue-on-error: true
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tasks.json
          git diff --staged --quiet || git commit -m "chore: cache tasks.json [skip ci]"
          git push origin HEAD:main || true

      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
